<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>JM Trips · Itinerario</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="shell">

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand"><h1>JM Trips</h1><span>· Itinerario</span></div>
  <div class="tb-right">
    <div class="ppill">
      <label>Personas</label>
      <button class="pb" onclick="chgP(-1)">−</button>
      <span class="pc" id="pcount">2</span>
      <button class="pb" onclick="chgP(1)">+</button>
    </div>
    <button class="btn" onclick="window.print()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.75 19.5m10.56-5.671-.441 5.671M3 8.25l2.25-2.25h13.5L21 8.25m-18 0v9a2.25 2.25 0 002.25 2.25h13.5A2.25 2.25 0 0021 17.25V8.25"/></svg>
      Imprimir
    </button>
    <button class="btn" onclick="resetState()" title="Borrar todos los cambios y volver al itinerario original" style="color:var(--dim)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
      Reiniciar
    </button>
    <button class="btn p" onclick="openAdd()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      Nueva actividad
    </button>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-tabs">
    <div class="sb-tab active" id="st-it" onclick="go('it')">Itinerario</div>
    <div class="sb-tab" id="st-gas" onclick="go('gas')">Gastos</div>
    <div class="sb-tab" id="st-mv" onclick="go('mv')">Mi viaje</div>
    <div class="sb-tab" id="st-outfits" onclick="go('outfits')">Equipaje</div>
  </div>
  <div class="sb-sum" id="sb-sum"></div>
  <div class="sb-sec">Días del viaje</div>
  <div id="sb-days"></div>
</aside>

<!-- MAIN -->
<main class="main" id="main"></main>
</div>

<!-- MOBILE NAV -->
<nav class="mob-nav">
  <button class="mob-btn active" id="mt-it" onclick="go('it')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
    Itinerario
  </button>
  <button class="mob-btn" id="mt-gas" onclick="go('gas')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
    Gastos
  </button>
  <button class="mob-btn" id="mt-mv" onclick="go('mv')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
    Mi viaje
  </button>
  <button class="mob-btn" id="mt-outfits" onclick="go('outfits')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
    Equipaje
  </button>
</nav>
<button class="fab" onclick="openAdd()">
  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
</button>

<!-- ACTIVITY MODAL -->
<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <h2 id="modal-title">Nueva actividad</h2>
    <div id="dp-sec">
      <div class="field"><label>¿En qué día?</label><div class="dpicker" id="dpicker"></div></div>
    </div>
    <div class="field"><label>Nombre de la actividad</label><input id="fn" placeholder="Ej: Cena en restaurante"/></div>
    <div class="field"><label>Horario</label><input id="ft" placeholder="Ej: 7:30 PM - 10:00 PM"/></div>
    <div class="frow">
      <div class="field"><label>Categoría</label>
        <select id="fc"><option>Comida</option><option>Turismo</option><option>Tour</option><option>Hotel</option><option>Logística</option><option>Transporte</option><option>Playa</option><option>Actividad</option><option>Espiritual</option><option>Evento</option><option>Libre</option><option>Ocio</option></select>
      </div>
      <div class="field"><label>Subcategoría</label><input id="fsc" placeholder="Ej: Cena"/></div>
    </div>
    <div class="fdiv">Lugar / Restaurante</div>
    <div class="field"><label>Nombre del lugar</label><input id="fv" placeholder="Ej: Santa Rita"/></div>
    <div class="field"><label>Link Google Maps</label><input id="fvu" placeholder="https://maps.google.com/..."/></div>
    <div class="field"><label>Nota / tip</label><textarea id="fvt" placeholder="Ej: Reservar con anticipación..."></textarea></div>
    <div class="fdiv">Presupuesto planificado (por persona)</div>
    <div class="field"><label>Costo estimado / persona ($)</label><input id="fp" type="number" min="0" step="0.5" placeholder="0"/></div>
    <div class="mact">
      <button class="mbtn pri" onclick="saveAct()">Guardar actividad</button>
      <button class="mbtn sec" onclick="closeModal()">Cancelar</button>
      <button class="mbtn del" id="del-btn" style="display:none" onclick="delAct()">Eliminar actividad</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
